  <rect x="136" y="240" width="66" height="84" rx="8" fill="none" stroke="#FF6600" stroke-width="10"/>
  <line x1="150" y1="268" x2="188" y2="268" stroke="#FF6600" stroke-width="8" stroke-linecap="round"/>
  <line x1="150" y1="286" x2="188" y2="286" stroke="#FFD090" stroke-width="8" stroke-linecap="round"/>
  <line x1="150" y1="304" x2="174" y2="304" stroke="#FFD090" stroke-width="8" stroke-linecap="round"/>

  <!-- 文档2（中间，稍高，主角） -->
