  <line x1="237" y1="252" x2="275" y2="252" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="237" y1="270" x2="275" y2="270" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="237" y1="288" x2="261" y2="288" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.5"/>

  <!-- 文档3 -->
  <rect x="310" y="240" width="66" height="84" rx="8" fill="none" stroke="#FFAA00" stroke-width="10"/>
  <line x1="324" y1="268" x2="362" y2="268" stroke="#FFAA00" stroke-width="8" stroke-linecap="round"/>
  <line x1="324" y1="286" x2="362" y2="286" stroke="#FFD090" stroke-width="8" stroke-linecap="round"/>
  <line x1="324" y1="304" x2="348" y2="304" stroke="#FFD090" stroke-width="8" stroke-linecap="round"/>
