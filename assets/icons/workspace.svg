  <!-- 主文件夹体 -->
  <path d="M80,180 L80,400 Q80,428 108,428 L404,428 Q432,428 432,400 L432,200 Q432,172 404,172 L256,172 L228,148 Q220,140 208,140 L108,140 Q80,140 80,168 Z"
