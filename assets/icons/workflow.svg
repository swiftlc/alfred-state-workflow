<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 背景 -->
  <rect width="512" height="512" rx="108" fill="#FFF7ED"/>

  <!-- 左节点圆 -->
  <circle cx="128" cy="256" r="52" fill="none" stroke="#FF6600" stroke-width="18"/>
  <!-- 左节点内：三横线 -->
  <line x1="108" y1="246" x2="148" y2="246" stroke="#FF6600" stroke-width="10" stroke-linecap="round"/>
  <line x1="108" y1="256" x2="148" y2="256" stroke="#FF6600" stroke-width="10" stroke-linecap="round"/>
  <line x1="108" y1="266" x2="136" y2="266" stroke="#FF6600" stroke-width="10" stroke-linecap="round"/>

  <!-- 左 → 中 连接线 + 箭头 -->
  <line x1="182" y1="256" x2="218" y2="256" stroke="#FF6600" stroke-width="14" stroke-linecap="round"/>
  <polyline points="208,240 228,256 208,272" fill="none" stroke="#FF6600" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 中心节点圆（稍大，主角） -->
  <circle cx="292" cy="256" r="68" fill="#FF6600"/>
  <!-- 中心：循环箭头（白色） -->
  <path d="M270,238 A28,28 0 0 1 314,238" fill="none" stroke="white" stroke-width="12" stroke-linecap="round"/>
  <polyline points="310,226 322,240 308,246" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M314,274 A28,28 0 0 1 270,274" fill="none" stroke="white" stroke-width="12" stroke-linecap="round"/>
  <polyline points="274,286 262,272 276,266" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 中 → 右 连接线 + 箭头 -->
  <line x1="362" y1="256" x2="396" y2="256" stroke="#FF6600" stroke-width="14" stroke-linecap="round"/>
  <polyline points="386,240 406,256 386,272" fill="none" stroke="#FF6600" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 右节点圆 -->
  <circle cx="440" cy="256" r="52" fill="none" stroke="#FF6600" stroke-width="18"/>
  <!-- 右节点内：闪电 -->
  <polyline points="450,230 436,258 446,258 434,282" fill="none" stroke="#FF6600" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
</svg>

