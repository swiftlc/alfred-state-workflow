<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 背景 -->
  <rect width="512" height="512" rx="108" fill="#FFF7ED"/>

  <!-- 文档主体 -->
  <rect x="120" y="96" width="232" height="300" rx="20"
        fill="none" stroke="#FF6600" stroke-width="18"/>

  <!-- 折角（右上） -->
  <polyline points="296,96 352,96 352,152" fill="none" stroke="#FF6600" stroke-width="18" stroke-linejoin="round"/>
  <line x1="296" y1="96" x2="352" y2="152" stroke="#FF6600" stroke-width="18"/>

  <!-- 内容横线 -->
  <line x1="156" y1="182" x2="276" y2="182" stroke="#FF6600"   stroke-width="12" stroke-linecap="round"/>
  <line x1="156" y1="214" x2="312" y2="214" stroke="#FFAA00"   stroke-width="10" stroke-linecap="round"/>
  <line x1="156" y1="244" x2="292" y2="244" stroke="#FFAA00"   stroke-width="10" stroke-linecap="round"/>
  <line x1="156" y1="274" x2="312" y2="274" stroke="#FFD090"   stroke-width="10" stroke-linecap="round"/>
  <line x1="156" y1="304" x2="240" y2="304" stroke="#FFD090"   stroke-width="10" stroke-linecap="round"/>

  <!-- 右侧浮动标签（键值） -->
  <rect x="340" y="200" width="100" height="34" rx="10" fill="#FF6600"/>
  <rect x="340" y="248" width="100" height="34" rx="10" fill="#FFAA00"/>
  <!-- 连接小线 -->
  <line x1="312" y1="214" x2="340" y2="217" stroke="#FF6600" stroke-width="6" stroke-linecap="round"/>
  <line x1="312" y1="244" x2="340" y2="265" stroke="#FFAA00" stroke-width="6" stroke-linecap="round"/>
</svg>

